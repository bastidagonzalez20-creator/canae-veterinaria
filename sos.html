<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANAE - SOS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <div class="screen active" id="sosScreen">
            <div class="call-screen">
                <h2>Clínica Patitas</h2>
                <div class="call-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="white"/></svg>
                </div>
                <p class="call-number">555-123-4567</p>
                
                <div class="call-actions">
                    <button class="call-action-btn" title="Silencio">🔇</button>
                    <button class="call-action-btn" title="Teclado">⌨️</button>
                    <button class="call-action-btn" title="Altavoz">🔊</button>
                    <button class="call-action-btn" title="Agregar">➕</button>
                    <button class="call-action-btn" title="Video">📹</button>
                    <button class="call-action-btn" title="Micrófono">🎤</button>
                </div>
                
                <button class="end-call-btn" onclick="endCall()">📞</button>
            </div>
        </div>
    </div>

    <script>
        function endCall() {
            window.location.href = 'app.html';
        }

        // Verificar autenticación
        if (localStorage.getItem('userLogged') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
